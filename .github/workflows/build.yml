name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: false
        type: string
      file_id:
        description: "Telegram file_id"
        required: false
        type: string
      tag:
        description: "Tag build"
        required: true
        type: string
      build_type:
        description: "debug / release"
        required: true
        default: "release"
        type: string
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download from file_id
        if: ${{ github.event.inputs.file_id != '' }}
        run: |
          echo "=== Downloading from file_id ==="
          echo "File ID: ${{ github.event.inputs.file_id }}"
          FILE_PATH=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/getFile?file_id=${{ github.event.inputs.file_id }}" | jq -r '.result.file_path')
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/$FILE_PATH" -o project.zip
          echo "=== File Info ==="
          ls -lh project.zip

      - name: Download from zip_url
        if: ${{ github.event.inputs.zip_url != '' }}
        run: |
          echo "=== Downloading from zip_url ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip
          echo "=== File Info ==="
          ls -lh project.zip

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            exit 1
          fi
          echo "✅ ZIP valid"
          unzip -q project.zip -d project_raw
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      - name: Setup memory 2GB for Gradle
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "android/gradle.properties" ]; then
            echo "org.gradle.jvmargs=-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
            echo "android.enableR8=true" >> android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
            echo "android.useAndroidX=true" >> android/gradle.properties
            echo "✅ Gradle properties updated"
          else
            echo "⚠️ android/gradle.properties not found, skipping"
          fi

      - name: 🔥 OPTIMASI BUILD (Proguard + Shrink Resources)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Optimasi Build ==="
          if [ -f "android/app/build.gradle" ]; then
            sed -i '/buildTypes {/a\
            release {\
                minifyEnabled true\
                shrinkResources true\
                proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"\
            }' android/app/build.gradle
            echo "✅ Optimasi Gradle applied"
          else
            echo "⚠️ android/app/build.gradle not found, skipping"
          fi

      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze > analyze_report.txt 2>&1 || true
            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
            rm -f analyze_report.txt
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode aktif. Workflow dihentikan di sini."
          exit 1

      - name: Flutter Doctor
        run: flutter doctor

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            timeout 120s flutter pub get || echo "⚠️ Gagal download package, lanjut aja..."
          fi

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"
          export GRADLE_OPTS="-Xmx2048m -Xms512m"
          export JAVA_OPTS="-Xmx2048m -Xms512m"
          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi!"
            flutter build apk --${{ github.event.inputs.build_type }} --split-per-abi
          else
            echo "☕ Project Native Android Terdeteksi!"
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi

      - name: Rename APK (Style Panzx)
        run: |
          echo "=== Renaming APK to flutter style ==="
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then
            echo "❌ Tidak ada APK ditemukan!"
            exit 1
          fi
          APK_DIR=$(dirname "$APK_FOUND")
          RANDOM_NAME="flutter_${{ github.event.inputs.tag }}.apk"
          mv "$APK_FOUND" "$APK_DIR/$RANDOM_NAME"
          echo "✅ APK renamed to: $RANDOM_NAME"
          echo "APK_FULL_PATH=$APK_DIR/$RANDOM_NAME" >> $GITHUB_ENV

      - name: Check APK Output
        run: |
          echo "=== APK Output ==="
          echo "Path: ${{ env.APK_FULL_PATH }}"
          ls -lh "${{ env.APK_FULL_PATH }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.tag }}
          path: ${{ env.APK_FULL_PATH }}
          retention-days: 7
          if-no-files-found: error
