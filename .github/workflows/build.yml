name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Job ID"
        required: true
      file_id:
        description: "Telegram file_id"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download file from Telegram via file_id
        run: |
          echo "=== Downloading file from Telegram ==="
          echo "File ID: ${{ github.event.inputs.file_id }}"
          
          # Ambil file path dari Telegram
          FILE_PATH=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/getFile?file_id=${{ github.event.inputs.file_id }}" | jq -r '.result.file_path')
          
          # Download file dari Telegram (GAK KENA LIMIT 20MB!)
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/$FILE_PATH" -o project.zip
          
          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            exit 1
          fi
          echo "✅ ZIP valid"
          
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw
          
          echo "=== Mengunci Project Dir ==="
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      - name: Setup memory 2GB for Gradle
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Setting up Gradle memory 2GB ==="
          if [ -f "android/gradle.properties" ]; then
            echo "org.gradle.jvmargs=-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
            echo "android.enableR8=true" >> android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
            echo "android.useAndroidX=true" >> android/gradle.properties
            echo "✅ Gradle properties updated"
          else
            echo "⚠️ android/gradle.properties not found, skipping"
          fi

      - name: Flutter Doctor
        run: flutter doctor

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            timeout 120s flutter pub get || echo "⚠️ Gagal download package, lanjut aja..."
          else
            echo "☕ Bukan project Flutter, skip pub get!"
          fi

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"
          export GRADLE_OPTS="-Xmx2048m -Xms512m"
          export JAVA_OPTS="-Xmx2048m -Xms512m"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi!"
            flutter build apk --${{ github.event.inputs.build_type }}
          else
            echo "☕ Project Native Android Terdeteksi!"
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi

      - name: Check APK Output
        run: |
          echo "=== APK Output Scanning ==="
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then
            echo "Error: Tidak ada APK yang dihasilkan!"
            exit 1
          fi
          echo "✅ APK Ditemukan: $APK_FOUND"
          echo "APK_PATH=$APK_FOUND" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
